<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#07070d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sweat It Out — AI Fitness Coach</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== RESET & VARS ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
:root{
  --bg:#07070d;--g:rgba(255,255,255,0.05);--gh:rgba(255,255,255,0.08);
  --b:rgba(255,255,255,0.09);--bf:rgba(108,99,255,0.6);
  --sh:0 8px 32px rgba(0,0,0,.5);
  --ac:#6c63ff;--ac2:#ff6584;--gr:#43d9ad;--or:#ff9f43;--bl:#54a0ff;--pu:#a29bfe;
  --tx:rgba(255,255,255,0.93);--tx2:rgba(255,255,255,0.55);--tx3:rgba(255,255,255,0.28);
  --pr:#54a0ff;--cb:#ff9f43;--ft:#ff6b6b;
  --fD:'Space Grotesk',sans-serif;--fB:'DM Sans',sans-serif;--fM:'JetBrains Mono',monospace;
  --nh:68px;--bh:58px;
  /* Aliases for JS-generated HTML */
  --text-muted:rgba(255,255,255,0.55);
  --accent-purple:#a29bfe;
  --accent-secondary:#ff6584;
  --accent-green:#43d9ad;
}
body{font-family:var(--fB);background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
h1,h2,h3,h4{font-family:var(--fD);line-height:1.2}
h2{font-size:clamp(1.2rem,4vw,1.6rem);font-weight:700}
h3{font-size:clamp(.95rem,3vw,1.1rem);font-weight:600}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}

/* ===== AMBIENT ===== */
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.11}
.o1{width:500px;height:500px;background:radial-gradient(circle,#6c63ff,transparent 70%);top:-200px;left:-100px;animation:floatA 20s ease-in-out infinite}
.o2{width:400px;height:400px;background:radial-gradient(circle,#ff6584,transparent 70%);bottom:-100px;right:-100px;animation:floatA 20s ease-in-out infinite;animation-delay:-7s}
.o3{width:300px;height:300px;background:radial-gradient(circle,#43d9ad,transparent 70%);top:50%;left:50%;animation:floatC 20s ease-in-out infinite;animation-delay:-14s}
@keyframes floatA{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.05)}66%{transform:translate(-20px,20px) scale(.95)}}
@keyframes floatC{0%,100%{transform:translate(-50%,-50%) scale(1)}33%{transform:translate(calc(-50% + 20px),calc(-50% - 20px)) scale(1.05)}66%{transform:translate(calc(-50% - 15px),calc(-50% + 15px)) scale(.95)}}
#particles{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* ===== GLASS ===== */
.gc{background:var(--g);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--b);border-radius:20px;box-shadow:var(--sh);transition:background .3s,border-color .3s}
.gc:hover{background:var(--gh)}

/* ===== KEYFRAMES ===== */
@keyframes popIn{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideUpMod{from{opacity:0;transform:translateY(80px)}to{opacity:1;transform:none}}
@keyframes tabIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(.95)}to{opacity:1;transform:none}}
@keyframes celebBounce{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1)}}
@keyframes confFall{to{transform:translateY(380px) rotate(720deg);opacity:0}}
@keyframes sr{to{transform:rotate(360deg)}}
@keyframes tdot{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes countUp{from{opacity:0}to{opacity:1}}

/* ===== REVEAL ===== */
.reveal{opacity:0;transform:translateY(16px);transition:opacity .44s ease,transform .44s ease}
.reveal.in{opacity:1;transform:none}

/* ===== UTILS ===== */
.hidden{display:none!important}
.muted{color:var(--tx2);font-size:.85rem}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--gr)}
.sync-dot.syncing{background:var(--or);animation:blink 1s infinite}

/* ===== BUTTONS ===== */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 22px;background:linear-gradient(135deg,var(--ac),var(--pu));color:#fff;font-family:var(--fB);font-size:.93rem;font-weight:600;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 20px rgba(108,99,255,.35);transition:transform .2s,box-shadow .2s,opacity .2s}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(108,99,255,.5)}
.btn:active:not(:disabled){transform:scale(.98)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-g{background:none;border:none;color:var(--tx2);font-family:var(--fB);font-size:.87rem;cursor:pointer;padding:8px 12px;border-radius:10px;transition:all .2s}
.btn-g:hover{color:var(--tx);background:var(--g)}
.btn-pill{padding:6px 13px;background:var(--g);border:1px solid var(--b);color:var(--ac);font-size:.78rem;font-weight:600;border-radius:999px;cursor:pointer;transition:all .2s}
.btn-pill:hover{background:rgba(108,99,255,.15);border-color:var(--ac)}
.btn-icon{width:43px;height:43px;display:flex;align-items:center;justify-content:center;background:var(--g);border:1px solid var(--b);border-radius:11px;font-size:1.05rem;cursor:pointer;transition:background .2s;flex-shrink:0}
.btn-icon:hover{background:var(--gh)}
.danger{color:var(--ac2)!important}

/* ===== FIELDS ===== */
.fi{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fi label{font-size:.7rem;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em}
.fi input,.fi select,.fi textarea{background:rgba(255,255,255,.06);border:1px solid var(--b);border-radius:11px;padding:11px 13px;color:var(--tx);font-family:var(--fB);font-size:.92rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(108,99,255,.16)}
.fi select option{background:#1a1a2e}
.fi textarea{resize:vertical;min-height:68px}
.hint{font-size:.72rem;min-height:14px;transition:color .2s;color:var(--tx3)}
.hint.e{color:var(--ac2)}.hint.ok{color:var(--gr)}
.row2{display:flex;gap:11px}.row2 .fi{flex:1}

/* ===== AUTH ===== */
#auth-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(7,7,13,.97);backdrop-filter:blur(12px)}
.auth-box{width:100%;max-width:400px;padding:30px 24px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
.auth-logo{text-align:center;margin-bottom:22px}
.auth-logo .ico{font-size:2.6rem;display:block;margin-bottom:8px;animation:pulse 2.5s ease infinite}
.auth-logo h1{font-size:1.9rem;font-weight:700;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-logo p{color:var(--tx2);font-size:.84rem;margin-top:4px}
.auth-tabs{display:flex;gap:4px;padding:4px;background:rgba(255,255,255,.04);border-radius:14px;margin-bottom:20px}
.auth-tab{flex:1;padding:9px;background:none;border:none;border-radius:11px;color:var(--tx2);font-family:var(--fB);font-size:.9rem;cursor:pointer;transition:all .25s}
.auth-tab.on{background:var(--ac);color:#fff;font-weight:600}
.auth-form{display:none;animation:fadeSlide .3s ease}
.auth-form.on{display:block}
.auth-msg{margin-top:10px;padding:10px 13px;border-radius:11px;font-size:.84rem;display:none}
.auth-msg.e{background:rgba(255,101,132,.13);color:var(--ac2);display:block;border:1px solid rgba(255,101,132,.24)}
.auth-msg.ok{background:rgba(67,217,173,.11);color:var(--gr);display:block;border:1px solid rgba(67,217,173,.22)}

/* ===== APP ===== */
#app{position:relative;z-index:1}
.tab-pane{position:absolute;inset:0;overflow-y:auto;padding:14px;display:none;scrollbar-width:thin}
.tab-pane.on{display:block;animation:tabIn .3s ease}

/* ===== TOP BAR ===== */
.top-bar{position:fixed;top:0;left:0;right:0;height:var(--bh);z-index:100;display:flex;align-items:center;padding:0 14px;gap:10px;background:rgba(7,7,13,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--b)}
.bar-title{flex:1;font-family:var(--fD);font-size:1.05rem;font-weight:600;display:flex;align-items:center;gap:7px}
.burger{width:34px;height:34px;display:flex;flex-direction:column;justify-content:center;gap:5px;background:none;border:none;cursor:pointer;flex-shrink:0}
.burger span{display:block;height:2px;background:var(--tx);border-radius:2px;transition:all .3s}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ===== BOTTOM NAV ===== */
.bot-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nh);z-index:100;display:flex;align-items:center;justify-content:space-around;background:rgba(7,7,13,.95);backdrop-filter:blur(20px);border-top:1px solid var(--b);padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;cursor:pointer;color:var(--tx3);transition:color .2s}
.nav-btn.on{color:var(--ac)}
.nav-btn .ni{font-size:1.22rem;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.nav-btn.on .ni{transform:scale(1.15) translateY(-2px);filter:drop-shadow(0 0 6px var(--ac))}
.nav-btn .nl{font-size:.62rem;font-weight:500}
.nav-line{position:absolute;bottom:0;height:2px;background:var(--ac);border-radius:2px 2px 0 0;transition:left .4s cubic-bezier(.34,1.56,.64,1),width .4s;box-shadow:0 0 8px var(--ac)}

/* ===== SIDE MENU ===== */
#side-menu{position:fixed;left:-290px;top:0;bottom:0;width:280px;z-index:200;padding:20px 16px;display:flex;flex-direction:column;gap:12px;transition:left .35s cubic-bezier(.4,0,.2,1);background:rgba(10,10,20,.98);backdrop-filter:blur(24px);border-right:1px solid var(--b);border-radius:0 24px 24px 0}
#side-menu.open{left:0}
#side-ov{position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none}
.menu-user{display:flex;align-items:center;gap:11px;padding-bottom:12px;border-bottom:1px solid var(--b)}
.menu-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0;overflow:hidden}
.menu-av img{width:100%;height:100%;object-fit:cover}
.menu-info strong{display:block;font-size:.9rem;font-weight:600}
.menu-info span{font-size:.7rem;color:var(--tx2)}
.menu-close{margin-left:auto;background:none;border:none;color:var(--tx2);font-size:1rem;cursor:pointer;padding:4px 7px;border-radius:7px}
.sync-row{display:flex;align-items:center;gap:7px;font-size:.72rem;color:var(--tx2)}
.menu-nav{display:flex;flex-direction:column;gap:2px;flex:1}
.mnb{display:flex;align-items:center;gap:11px;padding:10px 13px;background:none;border:none;color:var(--tx2);font-family:var(--fB);font-size:.9rem;cursor:pointer;border-radius:11px;text-align:left;transition:background .2s,color .2s;width:100%}
.mnb:hover{background:var(--g);color:var(--tx)}
.menu-foot{display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--b);padding-top:12px}

/* ===== CARDS ===== */
.card{padding:17px;margin-bottom:12px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.stack{display:flex;flex-direction:column;gap:12px;padding-bottom:20px}
.mt{margin-top:12px}

/* ===== HOME ===== */
.rings-row{display:flex;justify-content:space-around;margin:13px 0}
.ring-w{position:relative;width:76px;height:76px}
.ring-svg{width:76px;height:76px;transform:rotate(-90deg)}
.r-bg{fill:none;stroke:rgba(255,255,255,.07);stroke-width:6}
.r-fill{fill:none;stroke-width:6;stroke-linecap:round;stroke-dasharray:189;stroke-dashoffset:189;transition:stroke-dashoffset 1s ease}
.r-p{stroke:var(--pr);filter:drop-shadow(0 0 5px var(--pr))}
.r-c{stroke:var(--cb);filter:drop-shadow(0 0 5px var(--cb))}
.r-f{stroke:var(--ft);filter:drop-shadow(0 0 5px var(--ft))}
.ring-lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--fM);font-size:.7rem;font-weight:600;line-height:1}
.ring-lbl small{font-family:var(--fB);font-size:.5rem;color:var(--tx2);margin-top:2px}
.cals-total{font-family:var(--fM);font-size:.8rem;color:var(--tx2);text-align:center}
.water-bar{height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin:8px 0 12px}
.water-fill{height:100%;background:linear-gradient(90deg,var(--bl),var(--gr));border-radius:99px;transition:width .5s ease;width:0%}
.cups-grid{display:flex;flex-wrap:wrap;gap:7px}
.cup{width:33px;height:37px;background:var(--g);border:1px solid var(--b);border-radius:7px;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.cup.filled{background:rgba(84,160,255,.18);border-color:var(--bl);box-shadow:0 0 7px rgba(84,160,255,.3);transform:scale(1.06)}
.bmi-bar{height:7px;border-radius:99px;background:linear-gradient(90deg,var(--bl) 0%,var(--bl) 18%,var(--gr) 18%,var(--gr) 45%,var(--or) 45%,var(--or) 70%,var(--ft) 70%,var(--ft) 100%);position:relative;margin:10px 0 6px}
.bmi-marker{position:absolute;top:-4px;width:15px;height:15px;background:#fff;border-radius:50%;transform:translateX(-50%);box-shadow:0 2px 6px rgba(0,0,0,.5);transition:left 1s ease}
.bmi-sl{display:flex;justify-content:space-between;font-size:.62rem;color:var(--tx3)}
.snap-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}

/* ===== WORKOUT ===== */
.dtabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:3px;margin-bottom:7px}
.dtabs::-webkit-scrollbar{display:none}
.dtabs-row{display:flex;gap:7px;min-width:max-content}
.dtab{padding:7px 13px;background:var(--g);border:1px solid var(--b);border-radius:999px;color:var(--tx2);font-size:.77rem;font-weight:500;cursor:pointer;transition:all .25s;white-space:nowrap;line-height:1.4;text-align:center}
.dtab.active{background:var(--ac);border-color:transparent;color:#fff;font-weight:600;box-shadow:0 3px 12px rgba(108,99,255,.4)}
.dtab.done{border-color:var(--gr);color:var(--gr)}
.warmup-banner{background:rgba(67,217,173,.08);border:1px solid rgba(67,217,173,.22);border-radius:14px;padding:10px 13px;margin-bottom:9px;font-size:.81rem;color:var(--gr)}
.ex-card{background:var(--g);border:1px solid var(--b);border-radius:16px;padding:13px;margin-bottom:9px;transition:border-color .2s;position:relative;overflow:hidden}
.ex-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac);border-radius:2px 0 0 2px;opacity:0;transition:opacity .2s}
.ex-card:hover::before{opacity:1}
.ex-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ex-name{font-family:var(--fD);font-size:.9rem;font-weight:600}
.ex-muscle{font-size:.68rem;color:var(--tx2);margin-top:2px}
.ex-btns{display:flex;gap:5px}
.ex-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--g);border:1px solid var(--b);border-radius:8px;font-size:.82rem;cursor:pointer;transition:background .2s}
.ex-btn:hover{background:var(--gh)}
.sets-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.set-tag{padding:4px 8px;background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.2);border-radius:999px;font-family:var(--fM);font-size:.7rem;color:var(--pu)}
.ex-meta{display:flex;gap:9px;flex-wrap:wrap}
.mc{font-size:.67rem;color:var(--tx2);display:flex;align-items:center;gap:3px}
.ex-video{margin-top:10px;border-radius:11px;overflow:hidden;aspect-ratio:16/9}
.ex-video iframe{width:100%;height:100%;border:none}
.complete-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gr),#00b894);border:none;border-radius:14px;color:#fff;font-family:var(--fD);font-size:.96rem;font-weight:700;cursor:pointer;margin-top:13px;box-shadow:0 6px 22px rgba(67,217,173,.4);transition:transform .2s,box-shadow .2s}
.complete-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(67,217,173,.5)}
.complete-btn:disabled{opacity:.6;cursor:default;transform:none}
.deload-note{background:rgba(255,159,67,.07);border:1px solid rgba(255,159,67,.2);border-radius:13px;padding:10px 13px;font-size:.79rem;color:var(--or);margin-bottom:9px}
.vol-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.vol-lbl{font-size:.77rem;color:var(--tx2);width:74px;flex-shrink:0}
.vol-track{flex:1;height:7px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.vol-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--pu));border-radius:99px;transition:width 1s ease}
.vol-num{font-family:var(--fM);font-size:.7rem;color:var(--tx2);width:26px}

/* ===== DIET ===== */
.rest-banner{background:rgba(255,159,67,.09);border:1px solid rgba(255,159,67,.27);border-radius:14px;padding:10px 13px;display:flex;align-items:center;gap:9px;margin-bottom:11px;font-size:.82rem;color:var(--or)}
.meal-acc{background:var(--g);border:1px solid var(--b);border-radius:16px;margin-bottom:9px;overflow:hidden}
.meal-acc-head{display:flex;align-items:center;padding:12px 13px;cursor:pointer;gap:9px}
.meal-name-w{flex:1}
.meal-nm{font-weight:600;font-size:.9rem}
.meal-kcal{font-size:.71rem;color:var(--tx2)}
.m-pills{display:flex;gap:5px}
.mp{padding:3px 7px;border-radius:999px;font-family:var(--fM);font-size:.67rem;font-weight:600}
.mp.p{background:rgba(84,160,255,.13);color:var(--pr)}
.mp.c{background:rgba(255,159,67,.13);color:var(--cb)}
.mp.f{background:rgba(255,107,107,.13);color:var(--ft)}
.meal-acc-body{padding:0 13px 12px;border-top:1px solid var(--b)}
.meal-item-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:7px;font-size:.84rem}
.meal-item-row:last-child{border-bottom:none}
.mi-name{flex:1}
.mi-portion{font-size:.7rem;color:var(--tx2);margin-top:1px}
.mi-cals{font-family:var(--fM);font-size:.76rem;color:var(--tx2)}
.log-btn{padding:4px 8px;background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.27);border-radius:99px;color:var(--ac);font-size:.67rem;cursor:pointer;flex-shrink:0;transition:background .2s}
.log-btn:hover{background:rgba(108,99,255,.2)}
.swap-item{display:flex;align-items:center;gap:7px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.8rem}
.swap-from{color:var(--tx2);text-decoration:line-through}
.swap-arr{color:var(--tx3)}
.swap-to{color:var(--gr);font-weight:500}

/* ===== FOOD LOG ===== */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 13px}
.date-lbl{font-family:var(--fD);font-size:.9rem;font-weight:600}
.date-arr{width:33px;height:33px;background:var(--g);border:1px solid var(--b);border-radius:9px;color:var(--tx2);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.date-arr:hover{background:var(--gh);color:var(--tx)}
.cal-big{font-family:var(--fD);font-size:2.3rem;font-weight:700;line-height:1;background:linear-gradient(135deg,#fff,rgba(255,255,255,.65));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cal-sub{font-size:.77rem;color:var(--tx2);margin-top:3px}
.macro-chips{display:flex;gap:5px;flex-wrap:wrap}
.bud-bar{height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.bud-fill{height:100%;background:linear-gradient(90deg,var(--gr),var(--bl));border-radius:99px;transition:width .6s ease,background .3s;width:0%}
.bud-fill.over{background:linear-gradient(90deg,var(--or),var(--ac2))}
.search-row{display:flex;gap:7px;margin-bottom:9px}
.search-row input{flex:1;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:11px;color:var(--tx);font-family:var(--fB);font-size:.87rem;outline:none;transition:border-color .2s,box-shadow .2s}
.search-row input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(108,99,255,.15)}
.search-row select{padding:9px 12px;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:11px;color:var(--tx);font-family:var(--fB);font-size:.83rem;outline:none;cursor:pointer}
.food-results{max-height:270px;overflow-y:auto;margin-top:9px;border-top:1px solid var(--b);padding-top:6px}
.food-res{display:flex;align-items:center;padding:8px 6px;border-radius:11px;cursor:pointer;transition:background .2s;gap:7px}
.food-res:hover{background:var(--g)}
.fr-name{font-size:.85rem;flex:1}
.fr-meta{font-size:.7rem;color:var(--tx2);margin-top:1px}
.fr-badge{font-size:.62rem;padding:2px 6px;border-radius:99px;flex-shrink:0;margin-right:5px}
.b-local{background:rgba(67,217,173,.13);color:var(--gr)}
.b-api{background:rgba(84,160,255,.13);color:var(--bl)}
.b-ai{background:rgba(108,99,255,.13);color:var(--pu)}
.meal-slot{background:var(--g);border:1px solid var(--b);border-radius:16px;margin-bottom:9px;overflow:hidden}
.slot-head{display:flex;align-items:center;padding:11px 13px;cursor:pointer;gap:9px}
.slot-icon{font-size:1.1rem}
.slot-name{font-weight:600;flex:1;font-size:.88rem}
.slot-cals{font-family:var(--fM);font-size:.77rem;color:var(--tx2)}
.slot-body{padding:0 13px 11px}
.lfi{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:7px}
.lfi:last-child{border-bottom:none}
.lfi-n{flex:1;font-size:.83rem}
.lfi-q{font-size:.7rem;color:var(--tx2);margin-top:1px}
.lfi-c{font-family:var(--fM);font-size:.76rem;color:var(--tx2)}
.lfi-del{width:25px;height:25px;background:none;border:none;color:var(--tx3);cursor:pointer;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.82rem}
.lfi-del:hover{color:var(--ac2);background:rgba(255,101,132,.1)}
.tmpl-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:7px}
.tmpl-nm{flex:1;font-size:.85rem}
.tmpl-c{font-family:var(--fM);font-size:.75rem;color:var(--tx2)}
.tmpl-load,.tmpl-del{padding:4px 9px;background:none;border:1px solid var(--b);border-radius:7px;font-size:.72rem;cursor:pointer;transition:all .2s}
.tmpl-load{color:var(--ac);border-color:rgba(108,99,255,.28)}
.tmpl-del{color:var(--ac2);border-color:rgba(255,101,132,.26)}

/* ===== PROFILE ===== */
.prof-av-row{display:flex;align-items:center;gap:13px}
.prof-av-w{position:relative;width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));flex-shrink:0}
.prof-av-w img{width:68px;height:68px;border-radius:50%;object-fit:cover}
.av-init{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2))}
.av-up-btn{position:absolute;bottom:-3px;right:-3px;width:24px;height:24px;background:var(--ac);border:none;border-radius:50%;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.stat-card{padding:13px 9px;text-align:center}
.stat-n{font-family:var(--fD);font-size:1.65rem;font-weight:700;background:linear-gradient(135deg,var(--ac),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-l{font-size:.66rem;color:var(--tx2);margin-top:3px}
.heatmap-grid{display:flex;gap:3px;overflow-x:auto;padding-bottom:5px;scrollbar-width:none}
.heatmap-grid::-webkit-scrollbar{display:none}
.hm-col{display:flex;flex-direction:column;gap:3px}
.hm-cell{width:11px;height:11px;border-radius:2px;background:rgba(255,255,255,.05)}
.hm-cell.l4{background:var(--ac);box-shadow:0 0 5px rgba(108,99,255,.4)}
.pr-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:7px}
.pr-ex{flex:1;font-size:.85rem;font-weight:500}
.pr-val{font-family:var(--fM);font-size:.85rem;color:var(--or)}
.pr-dt{font-size:.66rem;color:var(--tx2)}
.pr-del{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:.82rem;padding:4px 6px;border-radius:6px;transition:all .2s}
.pr-del:hover{color:var(--ac2);background:rgba(255,101,132,.1)}
.stories-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.stories-row::-webkit-scrollbar{display:none}
.story-th{width:56px;height:76px;border-radius:11px;overflow:hidden;flex-shrink:0;cursor:pointer;border:2px solid var(--ac);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.story-th:hover{transform:scale(1.05)}
.story-th img{width:100%;height:100%;object-fit:cover}
.friend-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:9px}
.fr-av{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.req-item{display:flex;align-items:center;gap:7px;padding:7px 0}
.req-acc,.req-rej{padding:4px 10px;border-radius:7px;font-size:.73rem;cursor:pointer;transition:all .2s}
.req-acc{background:rgba(67,217,173,.12);border:1px solid rgba(67,217,173,.27);color:var(--gr)}
.req-rej{background:rgba(255,101,132,.09);border:1px solid rgba(255,101,132,.24);color:var(--ac2)}
.lb-filters{display:flex;gap:5px}
.lbf{padding:4px 10px;background:none;border:1px solid var(--b);border-radius:999px;color:var(--tx2);font-size:.7rem;cursor:pointer;transition:all .2s;font-family:var(--fB)}
.lbf.active{background:var(--ac);border-color:transparent;color:#fff}
.lb-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:9px}
.lb-rank{font-family:var(--fM);font-size:.86rem;font-weight:700;width:20px}
.lb-rank.g{color:#ffd700}.lb-rank.s{color:#c0c0c0}.lb-rank.b{color:#cd7f32}
.lb-user{flex:1;font-size:.85rem}
.lb-val{font-family:var(--fM);font-size:.85rem;color:var(--ac)}
.lb-me{background:rgba(108,99,255,.07);border-radius:7px;padding:2px 4px}

/* ===== TIMER ===== */
.timer-ov{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);padding:20px}
.timer-card{width:100%;max-width:305px;padding:23px 20px;text-align:center}
.timer-rw{position:relative;width:110px;height:110px;margin:0 auto 16px}
.timer-svg{width:110px;height:110px;transform:rotate(-90deg)}
.tr-bg{fill:none;stroke:rgba(255,255,255,.07);stroke-width:8}
.tr-fill{fill:none;stroke:var(--ac);stroke-width:8;stroke-linecap:round;stroke-dasharray:299;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 0 6px var(--ac))}
.timer-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fM);font-size:1.48rem;font-weight:700}
.pre-row{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.pre-btn{padding:6px 10px;background:var(--g);border:1px solid var(--b);border-radius:9px;color:var(--tx2);font-family:var(--fM);font-size:.74rem;cursor:pointer;transition:all .2s}
.pre-btn.active{background:rgba(108,99,255,.15);border-color:var(--ac);color:var(--pu)}
.pre-btn:hover{border-color:var(--ac);color:var(--pu)}
.timer-ctrls{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}

/* ===== MODALS ===== */
.modal{position:fixed;inset:0;z-index:400;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(8px)}
.modal-box{width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:21px;border-radius:24px 24px 0 0;animation:slideUpMod .38s cubic-bezier(.34,1.56,.64,1);background:rgba(12,12,22,.99);backdrop-filter:blur(24px);border:1px solid var(--b);border-bottom:none}
.modal-box.chat-box{border-radius:0;max-height:91vh;height:91vh;display:flex;flex-direction:column}
.mod-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.mod-x{width:28px;height:28px;background:var(--g);border:1px solid var(--b);border-radius:50%;color:var(--tx2);font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mod-x:hover{background:var(--gh);color:var(--tx)}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding:4px 0}
.chat-msg{max-width:86%;padding:8px 12px;border-radius:13px;font-size:.84rem;line-height:1.6;animation:fadeSlide .3s ease}
.chat-msg.user{align-self:flex-end;background:var(--ac);border-bottom-right-radius:4px}
.chat-msg.ai{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid var(--b);border-bottom-left-radius:4px}
.thinking{display:flex;gap:4px;align-items:center;padding:11px}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--tx2);animation:tdot 1.2s ease infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
.chat-in-row{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--b)}
.chat-in-row input{flex:1;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:11px;color:var(--tx);font-family:var(--fB);font-size:.86rem;outline:none}
.chat-in-row input:focus{border-color:var(--ac)}
.sub-list{display:flex;flex-direction:column;gap:8px}
.sub-item{display:flex;align-items:center;padding:10px 12px;background:var(--g);border:1px solid var(--b);border-radius:13px;gap:9px;cursor:pointer;transition:all .2s}
.sub-item:hover{background:var(--gh);border-color:var(--ac)}
.sub-nm{flex:1;font-size:.86rem;font-weight:500}
.sub-why{font-size:.7rem;color:var(--tx2)}
.apply-sub{font-size:.76rem;color:var(--ac);font-weight:600;flex-shrink:0}
.celeb-card{text-align:center;padding:28px;max-width:295px;margin:auto;border-radius:24px!important;position:relative;overflow:hidden}
.celeb-em{font-size:3.5rem;animation:celebBounce .7s cubic-bezier(.34,1.56,.64,1)}
#conf-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.conf-bit{position:absolute;top:-8px;animation:confFall 2s ease-in forwards}
.story-view{border-radius:0!important;max-width:100%;width:100%;height:100dvh;max-height:100dvh;padding:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000}
.story-view img{max-width:100%;max-height:calc(100dvh - 65px);object-fit:contain}
.story-close{position:absolute;top:17px;right:17px;z-index:10}
.story-info-txt{padding:13px;font-size:.8rem;color:rgba(255,255,255,.55)}

/* ===== LOADING ===== */
#loading-ov{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(7,7,13,.95);backdrop-filter:blur(12px)}
.loading-box{padding:34px;text-align:center;max-width:255px}
.ai-spin{width:52px;height:52px;position:relative;margin:0 auto 16px}
.spin-r{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:sr 2s linear infinite}
.spin-r:nth-child(1){border-top-color:var(--ac)}
.spin-r:nth-child(2){border-right-color:var(--ac2);animation-delay:-.5s;inset:7px}
.spin-r:nth-child(3){border-bottom-color:var(--gr);animation-delay:-1s;inset:14px}
.loading-dots{display:flex;gap:5px;justify-content:center;margin-top:11px}
.loading-dots span{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:sr .8s ease infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}.loading-dots span:nth-child(3){animation-delay:.4s}

/* ===== TOAST ===== */
#toast-wrap{position:fixed;top:68px;right:13px;left:13px;z-index:600;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;padding:10px 13px;background:rgba(16,16,26,.97);border:1px solid var(--b);border-radius:13px;font-size:.83rem;box-shadow:0 7px 22px rgba(0,0,0,.4);backdrop-filter:blur(20px);animation:toastIn .38s cubic-bezier(.34,1.56,.64,1);pointer-events:all}
.toast.ok{border-left:3px solid var(--gr)}.toast.e{border-left:3px solid var(--ac2)}.toast.i{border-left:3px solid var(--ac)}

/* ===== FAB ===== */
.ai-fab{position:fixed;bottom:calc(var(--nh) + 13px);right:13px;width:49px;height:49px;background:linear-gradient(135deg,var(--ac),var(--pu));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 18px rgba(108,99,255,.5);z-index:50;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.ai-fab:hover{transform:scale(1.1);box-shadow:0 8px 28px rgba(108,99,255,.6)}

/* ===== ONBOARDING ===== */
#onboarding{position:fixed!important;inset:0;z-index:900!important;background:var(--bg);display:flex;flex-direction:column}
.ob-slides{flex:1;overflow:hidden;position:relative}
.ob-slide{position:absolute;inset:0;padding:24px 22px 0;overflow-y:auto;display:none;animation:fadeSlide .35s ease}
.ob-slide.on{display:block}
.ob-head{text-align:center;margin-bottom:20px}
.ob-emoji{font-size:2.7rem;display:block;margin-bottom:9px}
.ob-head p{color:var(--tx2);font-size:.85rem;margin-top:4px}
.goal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.goal-card{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 7px;background:var(--g);border:2px solid var(--b);border-radius:14px;cursor:pointer;font-family:var(--fB);font-size:.76rem;color:var(--tx2);transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.goal-card .gi{font-size:1.38rem}
.goal-card.sel{background:rgba(108,99,255,.14);border-color:var(--ac);color:var(--pu);transform:scale(1.03)}
.days-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.day-chip{flex:1;min-width:62px;padding:10px 7px;background:var(--g);border:2px solid var(--b);border-radius:12px;color:var(--tx2);font-family:var(--fB);font-size:.87rem;font-weight:600;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);text-align:center}
.day-chip.sel{background:rgba(108,99,255,.14);border-color:var(--ac);color:var(--pu)}
.plan-prev{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.prev-item{display:flex;align-items:center;gap:12px;padding:12px 13px}
.prev-item .pi{font-size:1.35rem}
.prev-item strong{display:block;font-size:.87rem}
.prev-item p{font-size:.75rem;color:var(--tx2);margin-top:2px}
.ob-footer{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--b);background:var(--bg);padding-bottom:max(16px,env(safe-area-inset-bottom))}
.ob-dots{display:flex;gap:5px}
.ob-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.18);transition:all .3s}
.ob-dot.on{background:var(--ac);width:18px}
.ob-btns{display:flex;gap:7px}
.export-row{padding:4px 0 14px}
.collapse-arr{transition:transform .2s;font-size:.77rem;color:var(--tx3)}
.collapse-arr.rot{transform:rotate(-90deg)}


.swap-original{color:var(--tx2);text-decoration:line-through;font-size:.83rem}
.swap-arrow{color:var(--tx3);margin:0 6px}
.swap-new{color:var(--gr);font-weight:500;font-size:.83rem}
.lbf.active{background:var(--ac);border-color:transparent;color:#fff}

/* ===== DYNAMIC CLASS ALIASES ===== */
.cup-btn{width:33px;height:37px;background:var(--g);border:1px solid var(--b);border-radius:7px;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.cup-btn.filled{background:rgba(84,160,255,.18);border-color:var(--bl);box-shadow:0 0 7px rgba(84,160,255,.3);transform:scale(1.06)}

.heatmap-cell{width:11px;height:11px;border-radius:2px;background:rgba(255,255,255,.05)}
.heatmap-cell.level-4{background:var(--ac);box-shadow:0 0 5px rgba(108,99,255,.4)}
.muted-text{color:var(--tx2);font-size:.85rem}
.center-text{text-align:center}
.loading-spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--ac);border-radius:50%;animation:sr .8s linear infinite;margin:12px auto}
.volume-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.volume-muscle{font-size:.77rem;color:var(--tx2);width:74px;flex-shrink:0;text-transform:capitalize}
.volume-bar-track{flex:1;height:7px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.volume-bar-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--pu));border-radius:99px;transition:width 1s ease}
.volume-count{font-family:var(--fM);font-size:.7rem;color:var(--tx2);width:26px}
.apply-sub-btn{font-size:.76rem;color:var(--ac);font-weight:600;flex-shrink:0}
.sub-item-name{font-size:.86rem;font-weight:500}
.sub-item-reason{font-size:.72rem;color:var(--tx2);margin-top:2px}
.food-result-badge{font-size:.62rem;padding:2px 6px;border-radius:99px;flex-shrink:0;margin-right:5px}
.badge-local{background:rgba(67,217,173,.13);color:var(--gr)}
.badge-api{background:rgba(84,160,255,.13);color:var(--bl)}
.badge-ai{background:rgba(108,99,255,.13);color:var(--pu)}
.friend-avatar{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.friend-name{font-size:.85rem;font-weight:500}
.friend-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:9px}
.friend-req-item{display:flex;align-items:center;gap:7px;padding:7px 0}
.req-accept-btn{padding:4px 10px;border-radius:7px;font-size:.73rem;cursor:pointer;background:rgba(67,217,173,.12);border:1px solid rgba(67,217,173,.27);color:var(--gr)}
.req-reject-btn{padding:4px 10px;border-radius:7px;font-size:.73rem;cursor:pointer;background:rgba(255,101,132,.09);border:1px solid rgba(255,101,132,.24);color:var(--ac2)}
.lb-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:9px}
.lb-item.lb-self{background:rgba(108,99,255,.07);border-radius:7px;padding:8px}
.lb-rank{font-family:var(--fM);font-size:.86rem;font-weight:700;width:24px}
.lb-user{flex:1;font-size:.85rem}
.lb-value{font-family:var(--fM);font-size:.85rem;color:var(--ac)}
.story-thumb{width:56px;height:76px;border-radius:11px;overflow:hidden;flex-shrink:0;cursor:pointer;border:2px solid var(--ac);transition:transform .25s cubic-bezier(.34,1.56,.64,1);position:relative}
.story-thumb:hover{transform:scale(1.05)}

<script>

// State helpers - STATE object defined in index.html
// LRU Cache helpers
function cacheGet(key) {
  const item = STATE._lru.get(key);
  if (!item) return null;
  if (Date.now() - item.ts > 300000) { STATE._lru.delete(key); return null; }
  STATE._lru.delete(key); STATE._lru.set(key, item);
  return item.v;
}
function cacheSet(key, value) {
  if (STATE._lru.has(key)) STATE._lru.delete(key);
  if (STATE._lru.size >= 60) { const k = STATE._lru.keys().next().value; STATE._lru.delete(k); }
  STATE._lru.set(key, { v: value, ts: Date.now() });
}

<script>
// ===== PARTICLES =====
// ============================================================
// Particle System
// ============================================================

function initParticles() {
  const canvas = document.getElementById('particles');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  let w, h, particles;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function createParticles() {
    const count = Math.floor((w * h) / 25000); // density
    particles = Array.from({ length: count }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.3,
      opacity: Math.random() * 0.4 + 0.1,
      color: Math.random() > 0.5
        ? `rgba(108, 99, 255, `
        : Math.random() > 0.5
          ? `rgba(255, 101, 132, `
          : `rgba(67, 217, 173, `,
    }));
  }

  function drawParticle(p) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color + p.opacity + ')';
    ctx.fill();
  }

  function connectParticles() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(108, 99, 255, ${0.08 * (1 - dist / 120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function update() {
    ctx.clearRect(0, 0, w, h);

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;
      drawParticle(p);
    });

    connectParticles();
    requestAnimationFrame(update);
  }

  resize();
  createParticles();
  update();

  window.addEventListener('resize', () => {
    resize();
    createParticles();
  });
}

</script>

<script>
// ===== AI INTEGRATION =====
// ============================================================
// AI Integration (Cerebras API)
// ============================================================

// ── AI key helpers — exact pattern from working reference app ──────────────
// Key stored in Supabase app_config table: key='openai_key', value='csk-...'
// SQL: INSERT INTO app_config (key,value) VALUES ('openai_key','csk-YOUR-KEY')
//      ON CONFLICT (key) DO UPDATE SET value=EXCLUDED.value;

async function fetchAppConfig() {
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const res = await getSB()
        .from('app_config')
        .select('value')
        .eq('key', 'openai_key')
        .maybeSingle();
      if (res.data?.value) {
        CEREBRAS_KEY = res.data.value;
        console.log('[SIO] AI key loaded ✓ prefix=' + CEREBRAS_KEY.slice(0, 8));
        return;
      }
      console.error('[SIO] app_config row "openai_key" missing. Run SQL setup.');
      return;
    } catch(e) {
      console.warn('[SIO] fetchAppConfig attempt', attempt + 1, 'failed:', e.message);
      if (attempt < 2) await new Promise(r => setTimeout(r, 2000));
    }
  }
}

async function ensureKey() {
  if (CEREBRAS_KEY) return;
  await fetchAppConfig();
  if (!CEREBRAS_KEY) throw new Error('AI key not found. Add row key=openai_key to app_config in Supabase.');
}

// isJSON=true → adds strict JSON system prompt + reasoning_effort:'low' (matches working app)
async function callCerebras(messages, systemPrompt, stream = false, isJSON = false) {
  if (!CEREBRAS_KEY) await ensureKey();
  if (!CEREBRAS_KEY) throw new Error('AI key missing. Add key=openai_key to app_config in Supabase.');

  // Build messages — isJSON injects a strict JSON-only system prompt
  let allMessages;
  if (isJSON) {
    allMessages = [
      { role: 'system', content: 'You are a JSON generator. You MUST respond with ONLY a valid JSON object. No markdown, no code fences, no explanation — just the raw JSON starting with { and ending with }.' },
      ...messages
    ];
  } else if (typeof systemPrompt === 'string' && systemPrompt) {
    allMessages = [{ role: 'system', content: systemPrompt }, ...messages];
  } else {
    allMessages = messages;
  }

  // Build body — NEVER include stream:false (Cerebras rejects it), omit when not streaming
  const body = {
    model: CEREBRAS_MODEL,
    messages: allMessages,
    max_completion_tokens: isJSON ? 8192 : 4096,
    temperature: isJSON ? 0.3 : 0.7,
  };
  if (stream) body.stream = true;
  if (isJSON) body.response_format = { type: 'json_object' };
  if (isJSON && CEREBRAS_MODEL === 'gpt-oss-120b') body.reasoning_effort = 'low';

  const response = await fetch(`${CONFIG.CEREBRAS_BASE_URL}/chat/completions`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + CEREBRAS_KEY,
    },
    body: JSON.stringify(body),
  });

  if (!response.ok) {
    const errBody = await response.text().catch(() => '');
    let msg = 'AI error ' + response.status;
    try { const j = JSON.parse(errBody); msg = j.error?.message || j.message || msg; } catch(e2) {}
    if (response.status === 404) msg = 'API 404 — invalid API key or model name. Check app_config.';
    if (response.status === 401) msg = 'Invalid API key (401). Update openai_key in app_config.';
    if (response.status === 429) msg = 'Rate limit hit. Wait a moment and retry.';
    throw new Error(msg + (errBody && errBody.length < 200 ? ' — ' + errBody : ''));
  }

  if (stream) return response;
  const data = await response.json();
  return data.choices?.[0]?.message?.content || '';
}

// ---- AI Chat (streaming) ----
async function sendAIChat(message, context, historyMessages) {
  const contexts = {
    workout: `You are a personal trainer AI assistant helping the user with their workout plan. Current plan: ${JSON.stringify(STATE.workoutPlan?.days?.slice(0,2) || [])}`,
    diet: `You are a sports nutritionist AI helping with the user's diet plan. Profile: age=${STATE.profile?.age}, weight=${STATE.profile?.weight_kg}kg, goal=${STATE.profile?.goal}`,
    foodlog: `You are a nutrition coach helping the user track food. Today's log calories: ${getTodayTotalCals()}. Daily target: ${calcTDEE(STATE.profile)}`,
  };

  const messages = [
    ...historyMessages,
    { role: 'user', content: message }
  ];

  const response = await callCerebras(messages, contexts[context] || contexts.workout, true);

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';

  return {
    async *[Symbol.asyncIterator]() {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
        for (const line of lines) {
          const raw = line.replace('data: ', '').trim();
          if (raw === '[DONE]' || !raw) continue;
          try {
            const obj = JSON.parse(raw);
            const delta = obj.choices?.[0]?.delta?.content || '';
            if (delta) { fullText += delta; yield delta; }
          } catch {}
        }
      }
    },
    get fullText() { return fullText; }
  };
}

    if (!text) return;
    input.value = '';

    addChatMessage('user', text);

    // Add to history
    STATE.aiChatHistory[currentChatContext].push({ role: 'user', content: text });

    // Thinking indicator
    const thinking = document.createElement('div');
    thinking.className = 'chat-msg ai thinking';
    thinking.innerHTML = '<div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div>';
    document.getElementById('chat-msgs').appendChild(thinking);
    document.getElementById('chat-msgs').scrollTop = 99999;

    try {
      const historyMsgs = STATE.aiChatHistory[currentChatContext].slice(-10);
      const stream = await sendAIChat(text, currentChatContext, historyMsgs.slice(0, -1));

      thinking.remove();
      const aiDiv = addChatMessage('ai', '');

      for await (const chunk of stream) {
        aiDiv.textContent += chunk;
        document.getElementById('chat-msgs').scrollTop = 99999;
      }

      STATE.aiChatHistory[currentChatContext].push({ role: 'assistant', content: aiDiv.textContent });
    } catch(e) {
      thinking.remove();
      addChatMessage('ai', 'Sorry, I had trouble connecting. Please try again! ' + e.message);
    }
  };

  sendBtn?.addEventListener('click', send);
  input?.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
}

// ---- Helpers ----
function cleanJSON(str) {
  if (!str) return '{}';
  str = str.replace(/```json|```/g, '').trim();
  const fb = str.indexOf('{'), fbk = str.indexOf('[');
  let s = -1, isArr = false;
  if (fb === -1 && fbk === -1) return str;
  if (fb === -1) { s = fbk; isArr = true; }
  else if (fbk === -1) { s = fb; }
  else { s = Math.min(fb, fbk); isArr = fbk < fb; }
  const op = isArr ? '[' : '{', cl = isArr ? ']' : '}';
  let depth = 0, e = s;
  for (let i = s; i < str.length; i++) {
    if (str[i] === op) depth++;
    else if (str[i] === cl) { depth--; if (depth === 0) { e = i; break; } }
  }
  if (depth !== 0) {
    let p = str.slice(s).replace(/,\s*$/, '').replace(/,\s*"[^"]*"\s*:\s*[^,{}\[\]]*$/, '');
    let d = 0;
    for (const ch of p) { if (ch === '{' || ch === '[') d++; else if (ch === '}' || ch === ']') d--; }
    p += '}'.repeat(Math.max(0, d));
    return p;
  }
  return str.slice(s, e + 1);
}
function getTodayTotalCals() {
  const log = getTodayLog();
  let total = 0;
  Object.values(log).forEach(meal => {
    meal.forEach(item => total += item.calories || 0);
  });
  return total;
}

function getAvgDailyCals() {
  const logs = Object.values(STATE.foodLog);
  if (!logs.length) return 0;
  let total = 0;
  logs.forEach(log => {
    Object.values(log).forEach(meal => meal.forEach(item => total += item.calories || 0));
  });
  return Math.round(total / logs.length);
}

function getYoutubeId(exerciseName) {
  if (!exerciseName) return null;
  const key = exerciseName.toLowerCase().trim();
  // Exact match

  // Partial match — find first key that the exercise name contains or is contained by

// ---- Rest Timer ----
let timerInterval = null;
let timerTotal = 120;
let timerRemaining = 120;
let timerRunning = false;
const TIMER_CIRCUMFERENCE = 327; // 2πr for r=52

function openRestTimer(seconds = 120) {
  setTimer(seconds);
  $('timer-overlay').style.display='flex';
  startTimer();
}

function setTimer(seconds) {
  clearInterval(timerInterval);
  timerRunning = false;
  timerTotal = seconds;
  timerRemaining = seconds;
  updateTimerDisplay();
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.onclick?.toString().match(/\d+/)?.[0]) === seconds);
  });
  if (document.getElementById('timer-toggle')) {
    document.getElementById('timer-toggle').textContent = '▶ Start';
  }
}

function startTimer() {
  timerRunning = true;
  document.getElementById('timer-toggle').textContent = '⏸ Pause';
  timerInterval = setInterval(() => {
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timer-toggle').textContent = '▶ Restart';
      new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA').play().catch(()=>{});
      showToast('Rest done! 💪 Back to work!', 'success');
      return;
    }
    timerRemaining--;
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timer-val').textContent = fmtTime(timerRemaining);
  const progress = timerRemaining / timerTotal;
  const offset = TIMER_CIRCUMFERENCE * progress;
  document.getElementById('tr-fill').style.strokeDashoffset = TIMER_CIRCUMFERENCE - offset;
}

function initRestTimer() {
  document.getElementById('timer-toggle')?.addEventListener('click', () => {
    if (timerRunning) {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timer-toggle').textContent = '▶ Resume';
    } else {
      if (timerRemaining <= 0) setTimer(timerTotal);
      startTimer();
    }
  });
}

// ---- Regenerate ----
function regenWorkoutPlan() { showRegenModal('workout'); }

function escHTML(str) {
  return str?.replace(/'/g, "\\'").replace(/"/g, '&quot;') || '';
}

          <button class="btn-g" style="width:100%; margin-top:8px; font-size:0.82rem; padding:8px;" 
            onclick="logFullMeal(${idx}, ${mealIdx})">
            + Log Entire Meal
          </button>
        </div>
      </div>`;
  });

  container.innerHTML = html;
  setTimeout(() => revealAll(), 100);
}

function toggleDietMeal(dayIdx, mealIdx) {
  const body = document.getElementById(`dm-${dayIdx}-${mealIdx}`);
  if (!body) return;
  const isHidden = body.style.display === 'none' || body.style.display === '';
  body.style.display = isHidden ? 'block' : 'none';
}

function getMealIcon(name) {
  const n = name?.toLowerCase() || '';
  if (n.includes('breakfast')) return '🌅';
  if (n.includes('lunch')) return '☀️';
  if (n.includes('dinner')) return '🌙';
  if (n.includes('snack')) return '🍎';
  return '🍽️';
}

function getMealSlot(mealName) {
  const n = mealName?.toLowerCase() || '';
  if (n.includes('breakfast')) return 'breakfast';
  if (n.includes('lunch')) return 'lunch';
  if (n.includes('snack')) return 'snacks';
  if (n.includes('dinner')) return 'dinner';
  return 'snacks';
}

function logDietItem(name, calories, macros, slot) {
  const today = getTodayDate();
  if (!STATE.foodLog[today]) STATE.foodLog[today] = { breakfast: [], lunch: [], snacks: [], dinner: [] };

  STATE.foodLog[today][slot].push({
    id: Date.now().toString(),
    name,
    quantity: 100,
    unit: 'g',
    calories,
    protein: macros?.protein || 0,
    carbs: macros?.carbs || 0,
    fat: macros?.fat || 0,
  });

  saveLocalState();
  if (STATE.user) sbSaveFoodLog(STATE.user.id, today, STATE.foodLog[today]);
  showToast(`${name} logged to ${slot}!`, 'success');

  // Award points if nutrition goal hit
  checkNutritionGoal();
}

function logFullMeal(dayIdx, mealIdx) {
  const meal = STATE.dietPlan?.days?.[dayIdx]?.meals?.[mealIdx];
  if (!meal) return;
  const slot = getMealSlot(meal.name);
  meal.items?.forEach(item => {
    logDietItem(item.name, item.calories || 0, item.macros || {}, slot);
  });
  showToast(`Full ${meal.name} logged!`, 'success');
}

function checkNutritionGoal() {
  const today = getTodayDate();
  const log = STATE.foodLog[today];
  if (!log) return;
  let totalCals = 0;
  Object.values(log).forEach(meal => meal.forEach(item => totalCals += item.calories || 0));
  const target = calcTDEE(STATE.profile);
  if (totalCals >= target * 0.9 && totalCals <= target * 1.1) {
    // Within 10% of goal
    const todayKey = `goal_${today}`;
    if (!localStorage.getItem(todayKey)) {
      STATE.points += 20;
      localStorage.setItem(todayKey, '1');
      showToast('🎯 Nutrition goal hit! +20 points', 'success');
    }
  }
}

function renderWeeklySwaps() {
  const plan = STATE.dietPlan;
  const container = document.getElementById('swaps-body');
  if (!container || !plan?.weekly_swaps) return;

  container.innerHTML = plan.weekly_swaps.map(swap => `
    <div class="swap-item">
      <span class="swap-original">${swap.original}</span>
      <span class="swap-arrow">→</span>
      <div>
        <span class="swap-new">${swap.swap}</span>
        <div style="font-size:0.72rem; color:var(--text-muted); margin-top:2px;">${swap.reason}</div>
      </div>
    </div>
  `).join('');
}

// ---- Export Diet Plan ----
function exportDietPlan() {
  if (!STATE.dietPlan) { showToast('No diet plan to export', 'error'); return; }
  const wb = XLSX.utils.book_new();

  STATE.dietPlan.days?.forEach(day => {
    const rows = [['Meal', 'Item', 'Portion', 'Calories', 'Protein(g)', 'Carbs(g)', 'Fat(g)']];
    day.meals?.forEach(meal => {
      meal.items?.forEach(item => {
        rows.push([meal.name, item.name, item.portion || '', item.calories || 0,
          item.macros?.protein || 0, item.macros?.carbs || 0, item.macros?.fat || 0]);
      });
      rows.push(['', '', 'MEAL TOTAL', meal.total_calories || 0,
        meal.macros?.protein || 0, meal.macros?.carbs || 0, meal.macros?.fat || 0]);
      rows.push([]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, day.day_name || `Day ${day.day}`);
  });

  XLSX.writeFile(wb, 'FitAI_Diet_Plan.xlsx');
  showToast('Diet plan exported!', 'success');
}

function regenDietPlan() { showRegenModal('diet'); }

function searchFoodDebounced() {

async function searchFood() {
  const query = document.getElementById('food-q').value.trim();
  if (!query || query.length < 2) return;

  const cacheKey = `search_${query.toLowerCase()}`;
  const cached = cacheGet(cacheKey);
  const resultsContainer = document.getElementById('food-results');
  resultsContainer.classList.remove('hidden');

  // ── Step 1: Show local results INSTANTLY ─────────────────────
  const localMatches = INDIAN_FOODS.filter(f =>
    f.name.toLowerCase().includes(query.toLowerCase())
  ).map(f => ({ ...f, source: 'local' }));

  if (localMatches.length > 0) {
    renderFoodResults(localMatches);
  } else {
    resultsContainer.innerHTML = '<div class="loading-spinner"></div>';
  }

  if (cached) {
    renderFoodResults(cached);
    return;
  }

  let results = [...localMatches];

  // ── Step 2: Skip OpenFoodFacts if local has enough results ────
  if (localMatches.length < 4) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 3000); // 3s timeout
      const offRes = await fetch(
        `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=5&fields=product_name,nutriments`,
        { signal: ctrl.signal }
      );
      clearTimeout(tid);
      const offData = await offRes.json();
      const offItems = (offData.products || [])
        .filter(p => p.product_name && p.nutriments?.['energy-kcal_100g'])
        .slice(0, 5)
        .map(p => ({
          name: p.product_name,
          calories: Math.round(p.nutriments['energy-kcal_100g'] || 0),
          protein: +(p.nutriments['proteins_100g'] || 0).toFixed(1),
          carbs: +(p.nutriments['carbohydrates_100g'] || 0).toFixed(1),
          fat: +(p.nutriments['fat_100g'] || 0).toFixed(1),
          fiber: +(p.nutriments['fiber_100g'] || 0).toFixed(1),
          per: '100g', source: 'api',
        }));
      results.push(...offItems);
      if (offItems.length) renderFoodResults(results); // update with API results
    } catch (e) { /* timeout or network error — use local only */ }
  }

  // ── Step 3: AI fallback only if still very few results ────────
  if (results.length < 2) {
    try {
      const aiFood = await getAIFoodEstimate(query);
      if (aiFood) { results.push({ ...aiFood, source: 'ai' }); renderFoodResults(results); }
    } catch (e) { /* silent */ }
  }

  cacheSet(cacheKey, results);

  if (results.length === 0) {
    renderFoodResults([]);
  }
}

  const badgeClasses = { local: 'badge-local', api: 'badge-api', ai: 'badge-ai' };

  resultsContainer.innerHTML = results.slice(0, 15).map((f, i) => `

function updateFoodCalc() {
  if (!selectedFoodItem) return;
  const qty = parseFloat(document.getElementById('food-qty').value) || 100;
  const unit = document.getElementById('food-unit').value;

  let grams = qty;
  if (unit === 'piece' && selectedFoodItem.gramsPerPiece) {
    grams = qty * selectedFoodItem.gramsPerPiece;
  } else if (unit === 'ml') {
    grams = qty * (selectedFoodItem.density || 1);
  }

  const ratio = grams / 100;
  const cals = Math.round(selectedFoodItem.calories * ratio);
  const protein = +(selectedFoodItem.protein * ratio).toFixed(1);
  const carbs = +(selectedFoodItem.carbs * ratio).toFixed(1);
  const fat = +(selectedFoodItem.fat * ratio).toFixed(1);

  document.getElementById('food-calc-macros').innerHTML = `
    <span>🔥 <strong>${cals}</strong> kcal</span>
    <span>💪 <strong>${protein}g</strong> protein</span>
    <span>🌾 <strong>${carbs}g</strong> carbs</span>
    <span>🥑 <strong>${fat}g</strong> fat</span>
  `;
  window.__calcNutrition = { cals, protein, carbs, fat, grams };
}

function addFoodToLog() {
  if (!selectedFoodItem || !window.__calcNutrition) return;

  const slot = document.getElementById('meal-target').value;
  const date = STATE.currentFoodLogDate;
  const qty = parseFloat(document.getElementById('food-qty').value) || 100;
  const unit = document.getElementById('food-unit').value;
  const { cals, protein, carbs, fat } = window.__calcNutrition;

  if (!STATE.foodLog[date]) STATE.foodLog[date] = { breakfast: [], lunch: [], snacks: [], dinner: [] };

  STATE.foodLog[date][slot].push({
    id: Date.now().toString(),
    name: selectedFoodItem.name,
    quantity: qty,
    unit,
    calories: cals,
    protein,
    carbs,
    fat,
  });

  saveLocalState();
  if (STATE.user) sbSaveFoodLog(STATE.user.id, date, STATE.foodLog[date]);

  $('food-modal').style.display='none';
  document.getElementById('food-q').value = '';
  selectedFoodItem = null;
  renderFoodLog();
  showToast(`${selectedFoodItem?.name || 'Food'} added to ${slot}!`, 'success');

  // Points
  STATE.points += 5;
  checkNutritionGoal();
}

function deleteFoodItem(slot, itemId) {
  const date = STATE.currentFoodLogDate;
  if (!STATE.foodLog[date]?.[slot]) return;
  STATE.foodLog[date][slot] = STATE.foodLog[date][slot].filter(i => i.id !== itemId);
  saveLocalState();
  if (STATE.user) sbSaveFoodLog(STATE.user.id, date, STATE.foodLog[date]);
  renderFoodLog();
}

// ---- Macro Rings (home page) ----
function updateMacroRingsHomeHome(protein, carbs, fat) {
  const profile = STATE.profile;
  const tdee = calcTDEE(profile);
  const proteinTarget = (profile?.weight_kg || 70) * 2;
  const carbsTarget = (tdee * 0.45) / 4;
  const fatTarget = (tdee * 0.25) / 9;

  const CIRCUMFERENCE = 201;

  const setRing = (id, valId, current, target) => {
    const ring = document.getElementById(id);
    const val = document.getElementById(valId);
    if (ring) {
      const pct = Math.min(current / target, 1);
      ring.style.strokeDashoffset = CIRCUMFERENCE - (CIRCUMFERENCE * pct);
    }
    if (val) val.textContent = Math.round(current);
  };

  setRing('protein-ring', 'protein-val', protein, proteinTarget);
  setRing('carbs-ring', 'carbs-val', carbs, carbsTarget);
  setRing('fat-ring', 'fat-val', fat, fatTarget);

  const totalCals = protein * 4 + carbs * 4 + fat * 9;
  document.getElementById('home-cals-logged').textContent = Math.round(totalCals);
  document.getElementById('home-cals-target').textContent = Math.round(tdee);
}

// ---- Water Tracker ----
function initWaterTracker() {
  renderWater();
}

function renderWater() {
  const profile = STATE.profile;
  const weight = profile?.weight_kg || 70;
  const { ml, cups } = calcWaterGoal(weight);
  const todayWater = getTodayWater();

  document.getElementById('water-goal-display').textContent = (ml / 1000).toFixed(1) + 'L';
  document.getElementById('water-cups-logged').textContent = todayWater.cups;
  document.getElementById('water-cups-total').textContent = cups;

  const pct = Math.min((todayWater.cups / cups) * 100, 100);
  document.getElementById('water-fill-bar').style.width = pct + '%';

  const grid = document.getElementById('cups-grid');
  grid.innerHTML = '';
  for (let i = 0; i < cups; i++) {
    const btn = document.createElement('button');
    btn.className = `cup-btn${i < todayWater.cups ? ' filled' : ''}`;
    btn.textContent = '💧';
    btn.addEventListener('click', () => toggleCup(i, cups));
    grid.appendChild(btn);
  }
}

function toggleCup(idx, total) {
  const today = getTodayDate();
  if (!STATE.water[today]) STATE.water[today] = { cups: 0 };
  // If clicking a filled cup that's the last filled one, unfill it
  if (idx < STATE.water[today].cups) {
    STATE.water[today].cups = idx;
  } else {
    STATE.water[today].cups = idx + 1;
  }
  saveLocalState();
  renderWater();
}

// ---- Meal Templates ----
function renderTemplates() {
  const container = document.getElementById('tmpl-list');
  if (!container) return;
  const templates = STATE.templates || [];
  if (!templates.length) {
    container.innerHTML = '<p class="muted-text" style="font-size:0.82rem; padding: 4px 0;">No templates saved yet</p>';
    return;
  }
  container.innerHTML = templates.map(t => `
    <div class="tmpl-item">
      <div class="tmpl-nm">${t.name}</div>
      <div class="tmpl-c">${t.totalCals || '--'} kcal</div>
      <button class="tmpl-load" onclick="loadTemplate('${t.id}')">Load</button>
      <button class="tmpl-del" onclick="deleteTemplate('${t.id}')">✕</button>
    </div>
  `).join('');
}

async function saveCurrentAsTemplate() {
  if (STATE.templates?.length >= 8) {
    showToast('Max 8 templates. Delete one first.', 'error');
    return;
  }
  const name = prompt('Template name (e.g. "Bulk Day"):');
  if (!name?.trim()) return;

  const date = STATE.currentFoodLogDate;
  const log = STATE.foodLog[date] || {};
  let totalCals = 0;
  Object.values(log).forEach(m => m.forEach(i => totalCals += i.calories || 0));

  const template = {
    id: Date.now().toString(),
    name: name.trim(),
    totalCals: Math.round(totalCals),
    template_data: log,
  };

  if (!STATE.templates) STATE.templates = [];
  STATE.templates.unshift(template);

  if (STATE.user) {
    await sbSaveTemplate(STATE.user.id, template.name, { ...template.template_data, totalCals: template.totalCals });
  }

  renderTemplates();
  showToast('Template saved!', 'success');
}

function loadTemplate(templateId) {
  const template = STATE.templates?.find(t => t.id === templateId);
  if (!template) return;
  const date = STATE.currentFoodLogDate;
  STATE.foodLog[date] = JSON.parse(JSON.stringify(template.template_data));
  // Re-stamp IDs
  Object.values(STATE.foodLog[date]).forEach(meal => {
    meal.forEach(item => item.id = Date.now().toString() + Math.random());
  });
  saveLocalState();
  if (STATE.user) sbSaveFoodLog(STATE.user.id, date, STATE.foodLog[date]);
  renderFoodLog();
  showToast('Template loaded!', 'success');
}

async function deleteTemplate(templateId) {
  STATE.templates = STATE.templates?.filter(t => t.id !== templateId) || [];
  if (STATE.user) await sbDeleteTemplate(templateId);
  renderTemplates();
  showToast('Template deleted', 'info');
}

// ---- Export ----
function exportFoodLog() {
  const wb = XLSX.utils.book_new();
  const rows = [['Date', 'Meal', 'Food', 'Quantity', 'Unit', 'Calories', 'Protein(g)', 'Carbs(g)', 'Fat(g)']];

  Object.entries(STATE.foodLog).sort().forEach(([date, log]) => {
    Object.entries(log).forEach(([slot, items]) => {
      items.forEach(item => {
        rows.push([date, slot, item.name, item.quantity, item.unit,
          Math.round(item.calories), item.protein, item.carbs, item.fat]);
      });
    });
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, 'Food Log');
  XLSX.writeFile(wb, 'SweatItOut_Food_Log.xlsx');
  showToast('Food log exported!', 'success');
}

// ---- Heatmap ----
async function loadAndRenderHeatmap() {
  const { data: logs } = await sbGetWorkoutLogs(STATE.user.id, 13);
  STATE.workoutLogs = logs || [];

  // Calculate streak from logs
  const dates = new Set((logs || []).map(l => l.workout_date));
  const today = getTodayDate();
  let streak = 0;
  let d = new Date(today);
  while (true) {
    const ds = d.toISOString().split('T')[0];
    if (dates.has(ds)) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }

  STATE.streak = streak;
  STATE.totalWorkoutDays = logs?.length || STATE.profile?.total_workout_days || 0;

  // Render 13 weeks × 7 days heatmap
  const grid = document.getElementById('heatmap');
  if (!grid) return;
  grid.innerHTML = '';

  const weeks = 13;
  const startDate = new Date();
  startDate.setDate(startDate.getDate() - weeks * 7);

  for (let w = 0; w < weeks; w++) {
    const col = document.createElement('div');
    col.className = 'heatmap-col';
    for (let d2 = 0; d2 < 7; d2++) {
      const cell = document.createElement('div');

async function loadLeaderboard(sortBy = 'streak') {

  ).filter(Boolean);
  const allIds = [...new Set([myId, ...friendIds])];

  const { data: users } = await sbGetLeaderboard(allIds);
  if (!users) return;

  const sortFns = {
    streak: (a, b) => (b.streak || 0) - (a.streak || 0),
    points: (a, b) => (b.points || 0) - (a.points || 0),
    days: (a, b) => (b.total_workout_days || 0) - (a.total_workout_days || 0),
  };

  const sorted = [...users].sort(sortFns[sortBy] || sortFns.streak);

// ---- Image compression ----
async function compressImage(file, maxW, maxH, quality) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let { width, height } = img;
      if (width > maxW) { height = height * (maxW / width); width = maxW; }
      if (height > maxH) { width = width * (maxH / height); height = maxH; }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => { URL.revokeObjectURL(url); resolve(blob); }, 'image/jpeg', quality);
    };
    img.src = url;
  });
}

let _genTipIv = null;

function showGenLoading() {
  const el = document.getElementById('gen-loading');
  if (!el) return;
  el.classList.add('on');
  // Reset all steps
  for (let i = 0; i < 4; i++) {
    const s = document.getElementById('gstep-' + i);
    if (s) s.className = 'gen-step';
  }
  // Animate steps sequentially
  const delays = [0, 1800, 5000, 9500];
  delays.forEach((ms, i) => {
    setTimeout(() => {
      const s = document.getElementById('gstep-' + i);
      if (!s) return;
      // Mark previous done
      if (i > 0) {
        const prev = document.getElementById('gstep-' + (i - 1));
        if (prev) prev.className = 'gen-step done';
      }
      s.className = 'gen-step active';
    }, ms);
  });
  // Cycle tips
  let tipIdx = 0;
  const tipEl = document.getElementById('gen-tip');
  if (tipEl) tipEl.textContent = GEN_TIPS[0];

    tipIdx = (tipIdx + 1) % GEN_TIPS.length;
    if (tipEl) { tipEl.style.opacity = 0; setTimeout(() => { tipEl.textContent = GEN_TIPS[tipIdx]; tipEl.style.opacity = 1; }, 300); }
  }, 3000);
}

  clearInterval(_genTipIv);
  // Mark last step done

function mkSelect(lbl, id, opts, selIdx) {

function wireOnboarding() {
  STATE.selectedGoal = 'muscle_gain';
  STATE.selectedWeekdays = [0,1,3]; // Mon, Tue, Thu default
  STATE.selectedTrainingDays = 3;
  setTimeout(() => {
    selectGoal('muscle_gain');
    _renderWeekdayGrid();
  }, 50);
}

function showObSlide(n) {
  _obSlide = n;
  for (let i = 1; i <= 5; i++) {
    const s = $(`obs${i}`);
    if (s) s.style.display = i === n ? 'block' : 'none';
  }
  // Dots
  const dots = $('ob-dots')?.children;
  if (dots) {
    Array.from(dots).forEach((d, i) => {
      d.style.background = i < n ? '#6c63ff' : 'rgba(255,255,255,0.18)';
      d.style.width = i === n - 1 ? '18px' : '6px';
    });
  }
  const back = $('ob-back');
  if (back) back.style.visibility = n === 1 ? 'hidden' : 'visible';
  const next = $('ob-next');
  if (next) next.textContent = n === 5 ? '🚀 Generate Plan' : 'Next →';
}

function selectGoal(g) {
  STATE.selectedGoal = g;
  document.querySelectorAll('.goal-card').forEach(c => {
    const isThis = c.dataset.goal === g;
    c.style.background = isThis ? 'rgba(108,99,255,0.14)' : 'rgba(255,255,255,0.05)';
    c.style.borderColor = isThis ? '#6c63ff' : 'rgba(255,255,255,0.09)';
    c.style.color = isThis ? '#a29bfe' : 'rgba(255,255,255,0.55)';
    c.style.transform = isThis ? 'scale(1.03)' : '';
  });
}

function selectDays(d) {
  STATE.selectedTrainingDays = d;
  document.querySelectorAll('.day-chip').forEach(b => {
    const isThis = parseInt(b.dataset.d) === d;
    b.style.background = isThis ? 'rgba(108,99,255,0.14)' : 'rgba(255,255,255,0.05)';
    b.style.borderColor = isThis ? '#6c63ff' : 'rgba(255,255,255,0.09)';
    b.style.color = isThis ? '#a29bfe' : 'rgba(255,255,255,0.55)';
  });
}

// Selected workout weekdays (0=Mon..6=Sun)
STATE.selectedWeekdays = STATE.selectedWeekdays || [0,1,3]; // default Mon/Tue/Thu

function toggleWeekday(dayIdx) {
  if (!STATE.selectedWeekdays) STATE.selectedWeekdays = [];
  const i = STATE.selectedWeekdays.indexOf(dayIdx);
  if (i >= 0) { STATE.selectedWeekdays.splice(i, 1); }
  else { STATE.selectedWeekdays.push(dayIdx); }
  STATE.selectedTrainingDays = STATE.selectedWeekdays.length;
  _renderWeekdayGrid();
}

function _renderWeekdayGrid() {
  const days = STATE.selectedWeekdays || [];
  document.querySelectorAll('.wday-btn').forEach(b => {
    const idx = parseInt(b.dataset.day);
    const sel = days.includes(idx);
    b.style.background = sel ? 'rgba(108,99,255,0.18)' : 'rgba(255,255,255,0.05)';
    b.style.borderColor = sel ? '#6c63ff' : 'rgba(255,255,255,0.09)';
    b.style.transform = sel ? 'scale(1.05)' : 'scale(1)';
    b.querySelector('span:last-child').style.color = sel ? '#a29bfe' : 'rgba(255,255,255,0.6)';
  });
  const cnt = document.getElementById('wday-count');
  if (cnt) {
    cnt.textContent = days.length + ' day' + (days.length !== 1 ? 's' : '') + ' selected';
    cnt.style.color = days.length >= 2 ? '#6c63ff' : '#ff6584';
  }
}

function obBack() { if (_obSlide > 1) showObSlide(_obSlide - 1); }

function obNext() {
  if (!validateObSlide(_obSlide)) return;
  if (_obSlide < 5) { showObSlide(_obSlide + 1); return; }
  const data = gatherObData();
  if (!data) return;
  // Show loading screen immediately (z-index 950 sits above onboarding 900)
  showGenLoading();
  // Kick off generation after two animation frames to guarantee paint
  setTimeout(() => _doGenerate(data), 0);
}

async function _doGenerate(data) {
  try {
    const profile = {
      id: STATE.user.id,
      username: STATE.user.user_metadata?.username || STATE.user.email.split('@')[0],
      email: STATE.user.email,
      age: data.age, gender: data.gender, height_cm: data.height, weight_kg: data.weight,
      activity_level: data.activity, goal: data.goal, diet_preference: data.diet,
      training_days: data.trainingDays,
      split: data.split, experience: data.experience,
      equipment: data.equipment, notes: data.notes, is_onboarded: true,
      streak: 0, longest_streak: 0, total_workout_days: 0, points: 0,
      updated_at: new Date().toISOString()
    };
    // workout_days is only for plan generation — not stored in DB (no column)
    profile.workout_days = data.workout_days || [];
    await getSB().from('profiles').upsert(profile, { onConflict: 'id' });
    STATE.profile = profile;
    // Step 0 done — profile analysed
    const s0 = document.getElementById('gstep-0');
    if (s0) s0.className = 'gen-step done';
    const s1 = document.getElementById('gstep-1');
    if (s1) s1.className = 'gen-step active';

    // Generate sequentially — avoids token limit issues with parallel large requests
    const workout = await generateWorkoutPlan(profile);
    STATE.workoutPlan = workout;

    if (s1) s1.className = 'gen-step done';
    const s2 = document.getElementById('gstep-2');
    if (s2) s2.className = 'gen-step active';

    const diet = await generateDietPlan(profile);
    STATE.dietPlan = diet;

    if (s2) s2.className = 'gen-step done';
    const s3 = document.getElementById('gstep-3');
    if (s3) s3.className = 'gen-step active';
    saveLocal();
    await Promise.all([
      getSB().from('plans').upsert({ user_id: STATE.user.id, type: 'workout', plan_data: workout, updated_at: new Date().toISOString() }, { onConflict: 'user_id,type' }),
      getSB().from('plans').upsert({ user_id: STATE.user.id, type: 'diet', plan_data: diet, updated_at: new Date().toISOString() }, { onConflict: 'user_id,type' }),
    ]);
    hideGenLoading();
    $('onboarding').style.display = 'none';
    await bootMainApp();
    showToast('🎉 Your personalized plan is ready!', 'success');
  } catch (e) {
    hideGenLoading();
    // Show onboarding again so user can retry
    showToast('Error: ' + e.message + ' — please try again', 'error');
    console.error('_doGenerate error:', e);
  }
}  // end _doGenerate

function validateObSlide(n) {
  if (n === 1) {
    const age = $('ob-age')?.value, h = $('ob-height')?.value, w = $('ob-weight')?.value;
    if (!age || !h || !w) { showToast('Please fill all fields', 'error'); return false; }
  }
  if (n === 2) {
    if (!STATE.selectedWeekdays || STATE.selectedWeekdays.length < 2) {
      showToast('Select at least 2 workout days', 'error'); return false;
    }
  }
  if (n === 3 && !STATE.selectedGoal) { showToast('Select a goal', 'error'); return false; }
  return true;
}

function gatherObData() {
  const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const selectedDays = (STATE.selectedWeekdays || []).sort();
  return {
    age: parseInt($('ob-age')?.value),
    gender: $('ob-gender')?.value,
    height: parseFloat($('ob-height')?.value),
    weight: parseFloat($('ob-weight')?.value),
    activity: $('ob-activity')?.value,
    goal: STATE.selectedGoal || 'muscle_gain',
    diet: $('ob-diet')?.value,
    trainingDays: selectedDays.length || STATE.selectedTrainingDays || 4,
    workout_days: selectedDays.map(i => dayNames[i]),
    split: $('ob-split')?.value,
    experience: $('ob-experience')?.value,
    equipment: $('ob-equipment')?.value,
    notes: $('ob-notes')?.value || '',
  };
}

function initOnboarding() { /* called from index.html but showOnboarding() is the real entry */ }

</script>

// ---- Missing helpers ----
function updateGreeting() {
  const el = document.getElementById('home-greeting');
  if (!el) return;
  const h = new Date().getHours();
  const time = h < 12 ? 'Morning' : h < 17 ? 'Afternoon' : 'Evening';
  el.textContent = `Good ${time}, ${STATE.profile?.username || 'Athlete'} 👋`;
}

function updateRings(protein, carbs, fat) {
  const profile = STATE.profile;
  const tdee = calcTDEE(profile);
  const pTarget = (profile?.weight_kg || 70) * 2;
  const cTarget = (tdee * 0.45) / 4;
  const fTarget = (tdee * 0.25) / 9;
  const CIRC = 201;
  const setRing = (ringId, valId, cur, target) => {
    const r = document.getElementById(ringId);
    const v = document.getElementById(valId);
    if (r) r.style.strokeDashoffset = CIRC - (CIRC * Math.min(cur / target, 1));
    if (v) v.textContent = Math.round(cur);
  };
  setRing('protein-ring', 'protein-val', protein, pTarget);
  setRing('carbs-ring', 'carbs-val', carbs, cTarget);
  setRing('fat-ring', 'fat-val', fat, fTarget);
  const totalCals = protein * 4 + carbs * 4 + fat * 9;
  const logged = document.getElementById('home-cals-logged');
  const target = document.getElementById('home-cals-target');
  if (logged) logged.textContent = Math.round(totalCals);
  if (target) target.textContent = Math.round(tdee);
}

function formatDate(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T00:00:00');
  const t = new Date(); t.setHours(0,0,0,0);
  const diff = Math.round((d - t) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === -1) return 'Yesterday';
  return d.toLocaleDateString('en-IN', { weekday:'short', month:'short', day:'numeric' });
}

function animateCountUp(el, to) {
  if (!el) return;
  let start = null;
  const dur = 700;
  const step = ts => {
    if (!start) start = ts;
    const p = Math.min((ts - start) / dur, 1);
    el.textContent = Math.round(to * (1 - Math.pow(1 - p, 3)));
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}
