<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#07070d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FitAI</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div class="ambient"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div><canvas id="particles"></canvas></div>

<!-- AUTH - visible by default, hidden after login -->
<div id="auth-overlay" style="position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(7,7,13,0.97);backdrop-filter:blur(12px);">
  <div style="width:100%;max-width:400px;padding:30px 24px;background:rgba(255,255,255,0.05);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.09);border-radius:24px;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);">
    <div style="text-align:center;margin-bottom:22px;">
      <div style="font-size:2.6rem;margin-bottom:8px;animation:pulse 2.5s ease infinite;">⚡</div>
      <h1 style="font-family:'Space Grotesk',sans-serif;font-size:1.9rem;font-weight:700;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">FitAI</h1>
      <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-top:4px;">Your intelligent fitness companion</p>
    </div>
    <!-- Tab Row -->
    <div style="display:flex;gap:4px;padding:4px;background:rgba(255,255,255,0.04);border-radius:14px;margin-bottom:20px;">
      <button id="auth-tab-si" onclick="authTab('si')" style="flex:1;padding:9px;background:#6c63ff;border:none;border-radius:11px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.25s;">Sign In</button>
      <button id="auth-tab-su" onclick="authTab('su')" style="flex:1;padding:9px;background:none;border:none;border-radius:11px;color:rgba(255,255,255,0.5);font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer;transition:all 0.25s;">Sign Up</button>
    </div>
    <!-- Sign In Form -->
    <div id="form-si" style="display:block;">
      <div style="margin-bottom:13px;">
        <label style="display:block;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;">Email</label>
        <input id="si-email" type="email" placeholder="you@example.com" autocomplete="email"
          style="width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;"
          onfocus="this.style.borderColor='#6c63ff';this.style.boxShadow='0 0 0 3px rgba(108,99,255,0.18)'"
          onblur="this.style.borderColor='rgba(255,255,255,0.09)';this.style.boxShadow='none'">
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;">Password</label>
        <input id="si-pass" type="password" placeholder="••••••••" autocomplete="current-password"
          style="width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;"
          onfocus="this.style.borderColor='#6c63ff';this.style.boxShadow='0 0 0 3px rgba(108,99,255,0.18)'"
          onblur="this.style.borderColor='rgba(255,255,255,0.09)';this.style.boxShadow='none'"
          onkeydown="if(event.key==='Enter')doSignIn()">
      </div>
      <button onclick="doSignIn()" id="si-btn"
        style="width:100%;padding:14px;background:linear-gradient(135deg,#6c63ff,#a29bfe);color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;border:none;border-radius:13px;cursor:pointer;box-shadow:0 4px 20px rgba(108,99,255,0.35);transition:transform 0.2s,box-shadow 0.2s;"
        onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 8px 28px rgba(108,99,255,0.5)'"
        onmouseout="this.style.transform='';this.style.boxShadow='0 4px 20px rgba(108,99,255,0.35)'">
        Sign In
      </button>
      <button onclick="doForgot()"
        style="width:100%;margin-top:8px;padding:9px;background:none;border:none;color:rgba(255,255,255,0.45);font-family:'DM Sans',sans-serif;font-size:0.85rem;cursor:pointer;border-radius:10px;transition:all 0.2s;"
        onmouseover="this.style.color='rgba(255,255,255,0.8)';this.style.background='rgba(255,255,255,0.05)'"
        onmouseout="this.style.color='rgba(255,255,255,0.45)';this.style.background='none'">
        Forgot password?
      </button>
    </div>
    <!-- Sign Up Form -->
    <div id="form-su" style="display:none;">
      <div style="margin-bottom:12px;">
        <label style="display:block;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;">Username</label>
        <input id="su-user" type="text" placeholder="fitathlete99" autocomplete="username"
          style="width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;"
          onfocus="this.style.borderColor='#6c63ff';this.style.boxShadow='0 0 0 3px rgba(108,99,255,0.18)'"
          onblur="this.style.borderColor='rgba(255,255,255,0.09)';this.style.boxShadow='none'">
        <div id="su-user-hint" style="font-size:0.73rem;min-height:14px;margin-top:3px;color:rgba(255,255,255,0.3);transition:color 0.2s;"></div>
      </div>
      <div style="margin-bottom:12px;">
        <label style="display:block;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;">Email</label>
        <input id="su-email" type="email" placeholder="you@example.com" autocomplete="email"
          style="width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;"
          onfocus="this.style.borderColor='#6c63ff';this.style.boxShadow='0 0 0 3px rgba(108,99,255,0.18)'"
          onblur="this.style.borderColor='rgba(255,255,255,0.09)';this.style.boxShadow='none'">
        <div id="su-email-hint" style="font-size:0.73rem;min-height:14px;margin-top:3px;color:rgba(255,255,255,0.3);transition:color 0.2s;"></div>
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;">Password</label>
        <input id="su-pass" type="password" placeholder="Min 8 characters" autocomplete="new-password"
          style="width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;"
          onfocus="this.style.borderColor='#6c63ff';this.style.boxShadow='0 0 0 3px rgba(108,99,255,0.18)'"
          onblur="this.style.borderColor='rgba(255,255,255,0.09)';this.style.boxShadow='none'"
          onkeydown="if(event.key==='Enter')doSignUp()">
        <div id="su-pass-hint" style="font-size:0.73rem;min-height:14px;margin-top:3px;color:rgba(255,255,255,0.3);transition:color 0.2s;"></div>
      </div>
      <button onclick="doSignUp()" id="su-btn"
        style="width:100%;padding:14px;background:linear-gradient(135deg,#6c63ff,#a29bfe);color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;border:none;border-radius:13px;cursor:pointer;box-shadow:0 4px 20px rgba(108,99,255,0.35);transition:transform 0.2s,box-shadow 0.2s;"
        onmouseover="this.style.transform='translateY(-1px)'"
        onmouseout="this.style.transform=''">
        Create Account
      </button>
    </div>
    <div id="auth-msg" style="margin-top:10px;padding:10px 13px;border-radius:11px;font-size:0.84rem;font-family:'DM Sans',sans-serif;display:none;"></div>
  </div>
</div>

<!-- REST OF APP -->
<div id="onboarding" style="display:none;position:fixed;inset:0;z-index:900;background:#07070d;flex-direction:column;"></div>
<div id="app" style="display:none;"></div>
<div id="toast-wrap" style="position:fixed;top:70px;right:14px;left:14px;z-index:600;display:flex;flex-direction:column;gap:7px;pointer-events:none;"></div>
<div id="loading-overlay" style="display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;background:rgba(7,7,13,0.95);backdrop-filter:blur(12px);"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="js/config.js"></script>

<script>
// Core state
const STATE = { user:null, profile:null, workoutPlan:null, dietPlan:null, foodLog:{}, currentFoodLogDate:new Date().toISOString().split('T')[0], water:{}, prs:[], friends:[], friendRequests:[], templates:[], stories:[], workoutLogs:[], currentWorkoutDay:0, currentDietDay:0, currentTab:'home', aiChatHistory:{workout:[],diet:[],foodlog:[]}, streak:0, points:0, totalWorkoutDays:0, selectedGoal:'muscle_gain', selectedTrainingDays:4, _lru:new Map() };

let _sb = null;
function getSB() { if(!_sb) _sb=window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY); return _sb; }
window.supabaseClient = null; // will be set after init
Object.defineProperty(window, 'supabaseClient', { get:()=>getSB(), configurable:true });

// Helpers
function $(id){return document.getElementById(id);}
function showLoading(t){const o=$('loading-overlay');o.style.display='flex';o.innerHTML=`<div style="padding:36px;text-align:center;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.09);border-radius:22px;max-width:260px;"><div style="width:52px;height:52px;border:3px solid transparent;border-top-color:#6c63ff;border-radius:50%;animation:sr 0.8s linear infinite;margin:0 auto 16px;"></div><p style="font-size:0.87rem;color:rgba(255,255,255,0.6);">${t||'Processing...'}</p></div>`;}
function hideLoading(){$('loading-overlay').style.display='none';}
function showToast(msg,type,ms){type=type||'info';ms=ms||3200;const w=$('toast-wrap');const t=document.createElement('div');const c={success:'rgba(67,217,173,0.14)',error:'rgba(255,101,132,0.14)',info:'rgba(108,99,255,0.14)'};const bc={success:'#43d9ad',error:'#ff6584',info:'#6c63ff'};const ic={success:'✅',error:'❌',info:'ℹ️'};t.style.cssText=`display:flex;align-items:center;gap:9px;padding:11px 14px;background:rgba(16,16,26,0.97);border:1px solid rgba(255,255,255,0.08);border-left:3px solid ${bc[type]};border-radius:14px;font-size:0.84rem;font-family:'DM Sans',sans-serif;color:rgba(255,255,255,0.9);box-shadow:0 7px 22px rgba(0,0,0,0.4);animation:toastIn 0.38s cubic-bezier(0.34,1.56,0.64,1);pointer-events:all;`;t.innerHTML=`<span>${ic[type]}</span><span>${msg}</span>`;w.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(-6px) scale(0.95)';t.style.transition='all 0.3s';setTimeout(()=>t.remove(),300);},ms);}

function showAuthMsg(msg, type) {
  const el=$('auth-msg');
  el.textContent=msg;
  el.style.display='block';
  el.style.background=type==='err'?'rgba(255,101,132,0.13)':'rgba(67,217,173,0.11)';
  el.style.color=type==='err'?'#ff6584':'#43d9ad';
  el.style.border=`1px solid ${type==='err'?'rgba(255,101,132,0.25)':'rgba(67,217,173,0.22)'}`;
}

function authTab(tab) {
  const si=$('auth-tab-si'), su=$('auth-tab-su');
  const fsi=$('form-si'), fsu=$('form-su');
  if(tab==='si'){si.style.background='#6c63ff';si.style.color='#fff';si.style.fontWeight='600';su.style.background='none';su.style.color='rgba(255,255,255,0.5)';su.style.fontWeight='400';fsi.style.display='block';fsu.style.display='none';}
  else{su.style.background='#6c63ff';su.style.color='#fff';su.style.fontWeight='600';si.style.background='none';si.style.color='rgba(255,255,255,0.5)';si.style.fontWeight='400';fsu.style.display='block';fsi.style.display='none';}
  $('auth-msg').style.display='none';
}

async function doSignIn() {
  const email=$('si-email').value.trim(), pass=$('si-pass').value;
  if(!email||!pass){showAuthMsg('Please fill all fields','err');return;}
  const btn=$('si-btn');btn.disabled=true;btn.textContent='Signing in...';
  const {data,error}=await getSB().auth.signInWithPassword({email,password:pass});
  btn.disabled=false;btn.textContent='Sign In';
  if(error){showAuthMsg(error.message,'err');return;}
  if(data.user) await bootFromUser(data.user);
}

async function doSignUp() {
  const un=$('su-user').value.trim(),email=$('su-email').value.trim(),pass=$('su-pass').value;
  let ok=true;
  const setHint=(id,msg,isErr)=>{const h=$(id);h.textContent=msg;h.style.color=isErr?'#ff6584':'#43d9ad';};
  if(!un||un.length<3){setHint('su-user-hint','Min 3 characters',true);ok=false;}else setHint('su-user-hint','','');
  if(!email||!email.includes('@')){setHint('su-email-hint','Invalid email',true);ok=false;}else setHint('su-email-hint','','');
  if(pass.length<8){setHint('su-pass-hint','Min 8 characters',true);ok=false;}else setHint('su-pass-hint','','');
  if(!ok)return;
  const btn=$('su-btn');btn.disabled=true;btn.textContent='Creating...';
  const {data,error}=await getSB().auth.signUp({email,password:pass,options:{data:{username:un}}});
  btn.disabled=false;btn.textContent='Create Account';
  if(error){showAuthMsg(error.message,'err');return;}
  showAuthMsg('Account created! Check your email to verify, then sign in.','ok');
}

async function doForgot() {
  const email=$('si-email').value.trim();
  if(!email){showAuthMsg('Enter your email first','err');return;}
  const {error}=await getSB().auth.resetPasswordForEmail(email);
  showAuthMsg(error?error.message:'Reset email sent! Check inbox.',error?'err':'ok');
}

async function bootFromUser(user) {
  STATE.user=user;
  $('auth-overlay').style.display='none';
  const {data:profile}=await getSB().from('profiles').select('*').eq('id',user.id).single();
  if(!profile||!profile.is_onboarded){
    showOnboarding();
  } else {
    STATE.profile=profile;STATE.points=profile.points||0;STATE.streak=profile.streak||0;STATE.totalWorkoutDays=profile.total_workout_days||0;
    await bootMainApp();
  }
}

// Check session on load
window.addEventListener('load',async()=>{
  // particles
  initParticles();
  const {data:{session}}=await getSB().auth.getSession();
  if(session?.user) await bootFromUser(session.user);
  getSB().auth.onAuthStateChange((ev,sess)=>{if(ev==='SIGNED_IN'&&sess?.user&&!STATE.user)bootFromUser(sess.user);});
});

function getTodayDate(){return new Date().toISOString().split('T')[0];}
function calcTDEE(p){if(!p)return 2000;const{age,gender,height_cm:h,weight_kg:w,activity_level:a}=p;let bmr=gender==='female'?10*w+6.25*h-5*age-161:10*w+6.25*h-5*age+5;const m={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,athlete:1.9};return Math.round(bmr*(m[a]||1.55));}
function calcBMI(p){if(!p||!p.height_cm||!p.weight_kg)return null;return+(p.weight_kg/Math.pow(p.height_cm/100,2)).toFixed(1);}
function getBMIInfo(b){if(!b)return{label:'--',color:'#aaa'};if(b<18.5)return{label:'Underweight',color:'#54a0ff'};if(b<25)return{label:'Normal',color:'#43d9ad'};if(b<30)return{label:'Overweight',color:'#ff9f43'};return{label:'Obese',color:'#ff6b6b'};}
function calcWater(wkg){const ml=Math.round(wkg*35);return{ml,cups:Math.round(ml/250)};}
const QUOTES=['The only bad workout is the one that didn\'t happen.','Your body achieves what your mind believes.','Progress, not perfection.','Every rep is a step closer to your goal.','Discipline is doing it when you don\'t feel like it.','Champions are made from what they have deep inside.','Make yourself proud.','Strong mind, strong body.'];
function getDailyQuote(){return QUOTES[new Date().getDate()%QUOTES.length];}
function fmtDate(ds){const d=new Date(ds+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);const diff=Math.round((d-t)/86400000);if(diff===0)return'Today';if(diff===-1)return'Yesterday';if(diff===1)return'Tomorrow';return d.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});}
function fmtDateS(ds){if(!ds)return'';return new Date(ds.split('T')[0]+'T00:00:00').toLocaleDateString('en-IN',{month:'short',day:'numeric'});}
function fmtTime(s){return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;}
function animCount(el,to,dur){if(!el)return;dur=dur||900;let st=null;const f=ts=>{if(!st)st=ts;const p=Math.min((ts-st)/dur,1);el.textContent=Math.round(to*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(f);};requestAnimationFrame(f);}
function launchConfetti(w){if(!w)return;const c=['#6c63ff','#ff6584','#43d9ad','#ff9f43','#54a0ff','#ffd700'];for(let i=0;i<50;i++){const b=document.createElement('div');const sz=4+Math.random()*7,dl=Math.random()*.8;b.style.cssText=`position:absolute;left:${Math.random()*100}%;top:-8px;width:${sz}px;height:${sz}px;background:${c[Math.floor(Math.random()*c.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation:confFall ${1.5+Math.random()}s ease-in ${dl}s forwards;`;w.appendChild(b);}setTimeout(()=>w.innerHTML='',3200);}
function setSyncing(){document.querySelectorAll('.sync-dot').forEach(d=>d.classList.add('syncing'));const t=$('sync-txt');if(t)t.textContent='Syncing...';}
function setSynced(){document.querySelectorAll('.sync-dot').forEach(d=>d.classList.remove('syncing'));const t=$('sync-txt');if(t)t.textContent='Synced';}
function saveLocal(){try{localStorage.setItem('fitai',JSON.stringify({workoutPlan:STATE.workoutPlan,dietPlan:STATE.dietPlan,foodLog:STATE.foodLog,water:STATE.water,workoutCompleted:STATE.workoutCompleted||{},currentWorkoutDay:STATE.currentWorkoutDay,currentDietDay:STATE.currentDietDay}));}catch(e){}}
function loadLocal(){try{const d=JSON.parse(localStorage.getItem('fitai')||'{}');if(d.workoutPlan)STATE.workoutPlan=d.workoutPlan;if(d.dietPlan)STATE.dietPlan=d.dietPlan;if(d.foodLog)STATE.foodLog=d.foodLog;if(d.water)STATE.water=d.water;if(d.workoutCompleted)STATE.workoutCompleted=d.workoutCompleted;if(d.currentWorkoutDay!==undefined)STATE.currentWorkoutDay=d.currentWorkoutDay;if(d.currentDietDay!==undefined)STATE.currentDietDay=d.currentDietDay;}catch(e){}}
function getTodayLog(){const t=getTodayDate();if(!STATE.foodLog[t])STATE.foodLog[t]={breakfast:[],lunch:[],snacks:[],dinner:[]};return STATE.foodLog[t];}
function getTodayWater(){const t=getTodayDate();if(!STATE.water[t])STATE.water[t]={cups:0};return STATE.water[t];}
</script>

<script src="js/particles.js"></script>
<script src="js/onboarding.js"></script>
<script src="js/ai.js"></script>
<script src="js/workout.js"></script>
<script src="js/diet.js"></script>
<script src="js/foodlog.js"></script>
<script src="js/profile.js"></script>
<script src="js/home.js"></script>
<script src="js/main-app.js"></script>
</body>
</html>
